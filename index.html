<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <div id="content">Waiting...</div>

  <script>
    const content = document.getElementById("content");

    window.addEventListener("message", function(event) {
      content.innerHTML = String(event.data);

      window.parent.postMessage("Recieved & loaded!", "*");
    });
  </script>
</body>
</html>
