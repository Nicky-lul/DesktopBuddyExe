<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #content {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="content">Waiting for HTML...</div>

  <script>
    const content = document.getElementById("content");

    window.addEventListener("message", function(event) {
      if (typeof event.data !== "string") return;

      content.innerHTML = event.data;

      event.source.postMessage("Recieved & loaded!", event.origin);
    });
  </script>
</body>
</html>
